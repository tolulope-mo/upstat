syntax = "proto3";

package proto;

option go_package = "github.com/CuesoftCloud/upstat/proto";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GoogleAuth(GoogleAuthRequest) returns (GetUserResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc GetAllUsers(Empty) returns (GetAllUsersResponse);
}


service MonitorService{
   rpc CreateMonitor(CreateMonitorRequest) returns (MonitorResponse);
   rpc UpdateMonitor(UpdateMonitorRequest) returns (MonitorResponse);
   rpc GetMonitor(GetMonitorRequest) returns (MonitorResponse);
   rpc ListMonitors(ListMonitorsRequest) returns (ListMonitorsResponse);
   rpc DeleteMonitor(DeleteMonitorRequest) returns (DeleteMonitorResponse);
   rpc GetStatusPage(GetStatusPageRequest) returns (GetStatusPageResponse);
}

message GetStatusPageRequest{
 string owner_id = 1;
}

message GetStatusPageResponse {
  repeated Monitor monitors = 1;
  repeated Incident active_incidents = 2;
  repeated Incident historical_incidents = 3;
  double uptime_percentage = 4;
  int64 total_checks = 5;
  int64 successful_checks = 6;
}

message Incident {
  string id = 1;
  string monitor_id = 2;
  string title = 3;
  string failure_reason = 4;
  string status = 5;
  string started_at = 6;
  string resolved_at = 7;
  int64 duration_seconds = 8;
}

message Monitor{
  string id = 1;
  string owner_id = 2;
  string name = 3;
  string type = 4;
  string target = 5; 
  string created_at = 6;
  string updated_at = 7;
  bool active = 8;
  string status = 9;
  int32 interval_seconds = 10;
  int32 timeout_seconds = 11;
  int32 failure_threshold = 12;
  int32 consecutive_failures = 13;
  string last_checked_at = 14;
  int64 last_response_time_ms = 15;
  int32 last_status_code = 16;
}

message CreateMonitorRequest{
  string name = 1;
  string type = 2;
  string target = 3;
}

message UpdateMonitorRequest{
  string id = 1;
  string name = 2;
  string type = 3;
  string target = 4;
}

message GetMonitorRequest{
  string id = 1;
}

message MonitorResponse{
  Monitor monitor = 1;
  string Status = 2;
}

message DeleteMonitorRequest{
   string id = 1;
}

message DeleteMonitorResponse{
   string data = 1;
   string Status = 2;
}

message ListMonitorsRequest{}

message ListMonitorsResponse{
   repeated Monitor monitors = 1;
}



message GetUserRequest {
  string email = 1;
  string password = 2;
}

message GoogleAuthRequest {
  string id_token = 1;
}

message GetUserResponse {
  string id = 1;
  string name = 2;
  string email = 3;
  string token = 4;
  string status = 5;
  string data = 6;
}

message CreateUserRequest {
  string name = 1;
  string email = 2;
  string password = 3;
}

message CreateUserResponse {
  string data = 1;
  string status = 2;
}

message UpdateUserRequest {
  string id = 1;
  string name = 2;
  string email = 3;
  string password = 4;
}

message UpdateUserResponse {
  string data = 1;
  string status = 2;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {
  string data = 1;
  string status = 2;
}

message Empty {}

message GetAllUsersResponse {
  repeated GetUserResponse users = 1;
}
